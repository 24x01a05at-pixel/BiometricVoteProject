<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote Cast Successfully!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at 50% 50%, #0f172a 0%, #090d16 100%); color: white; font-family: 'Outfit', sans-serif; min-height: 100vh; }
        .success-card { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card success-card p-5">
                    <div class="mb-4 text-success">
                        <i class="bi bi-check-circle display-1 animate__animated animate__zoomIn"></i>
                    </div>
                    <h2 class="fw-bold mb-2">Vote Cast Successfully!</h2>
                    <p class="text-secondary mb-4">Your vote has been cryptographically recorded on the serverless electronic ledger. Thank you for voting.</p>
                    <div class="spinner-border text-primary spinner-border-sm mb-3"></div>
                    <p class="text-muted small">Redirecting to main portal in <span id="secs">5</span> seconds...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let countdown = 5;
        setInterval(() => {
            countdown--;
            document.getElementById('secs').innerText = countdown;
            if (countdown <= 0) {
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>
</body>
</html>
