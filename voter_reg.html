<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometric Voter Enrollment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f1f5f9; font-family: 'Outfit', sans-serif; }
        .webcam-container { 
            position: relative; 
            width: 100%; 
            max-width: 480px; 
            margin: 0 auto; 
            border-radius: 20px; 
            overflow: hidden; 
            background: #000; 
            border: 4px solid #3b82f6;
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.3);
        }
        video { width: 100%; display: block; }
        .scan-overlay { 
            position: absolute; 
            top: 10%; 
            left: 15%; 
            width: 70%; 
            height: 80%; 
            border: 2px dashed rgba(59, 130, 246, 0.8); 
            border-radius: 50%; 
            pointer-events: none; 
            z-index: 5;
        }
        @keyframes scanline {
            0% { top: 0%; opacity: 0.8; }
            50% { opacity: 0.4; }
            100% { top: 100%; opacity: 0.8; }
        }
        .scan-bar {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to bottom, transparent, #3b82f6, transparent);
            box-shadow: 0 0 15px #3b82f6;
            animation: scanline 2.5s infinite linear;
            pointer-events: none;
            z-index: 6;
        }
        .card-custom { border: none; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-shield-check text-primary me-2"></i>Biometric Vote</a>
            <a href="index.html" class="btn btn-outline-light btn-sm"><i class="bi bi-house me-1"></i>Home Portal</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            
            <!-- Registration Form & Camera -->
            <div class="col-lg-7">
                <div class="card card-custom p-4 p-md-5 bg-white">
                    <h3 class="fw-bold text-dark mb-2"><i class="bi bi-person-plus-fill text-primary me-2"></i>Biometric Voter Enrollment</h3>
                    <p class="text-muted small mb-4">Center your face in the oval frame below to capture your unique face encoding & voter profile photo. The camera does a real-time liveness check to block photos or mobile screens.</p>

                    <!-- Alert Banner -->
                    <div id="alert-box" class="alert d-none mb-4" role="alert"></div>

                    <form id="reg-form">
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Voter Full Name</label>
                            <input type="text" id="voter_name" class="form-control form-control-lg" placeholder="e.g. Rahul Sharma" required>
                        </div>

                        <div class="mb-4 text-center">
                            <label class="form-label fw-semibold mb-2">Live Facial Capture</label>
                            <div class="webcam-container">
                                <video id="webcam" autoplay playsinline></video>
                                <div class="scan-overlay"></div>
                                <div class="scan-bar"></div>
                            </div>
                            <canvas id="canvas" class="d-none" width="640" height="480"></canvas>
                        </div>

                        <button type="submit" id="btn-submit" class="btn btn-primary btn-lg w-100 py-3 fw-bold">
                            <i class="bi bi-camera-fill me-2"></i>CAPTURE FACE & REGISTER VOTER
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Client-Side Biometrics & Web Storage Script -->
    <script src="db.js"></script>
    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const regForm = document.getElementById('reg-form');
        const alertBox = document.getElementById('alert-box');
        const submitBtn = document.getElementById('btn-submit');

        // Access webcam
        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("Camera access denied:", err);
                showAlert('danger', "Camera access denied. Please allow camera permissions to capture facial biometrics.");
            });

        function checkLiveness(canvasEl) {
            const ctx = canvasEl.getContext('2d');
            const width = 160;
            const height = 120;
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = width;
            tempCanvas.height = height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(canvasEl, 0, 0, width, height);
            
            const imgData = tempCtx.getImageData(0, 0, width, height);
            const data = imgData.data;
            
            const gray = new Float32Array(width * height);
            for (let i = 0; i < data.length; i += 4) {
                gray[i / 4] = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
            }
            
            const laplacian = new Float32Array(width * height);
            let mean = 0;
            let count = 0;
            
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    const idx = y * width + x;
                    const val = 
                        gray[idx - width] + 
                        gray[idx - 1] +     
                        -4 * gray[idx] +    
                        gray[idx + 1] +     
                        gray[idx + width];  
                        
                    laplacian[idx] = val;
                    mean += val;
                    count++;
                }
            }
            
            mean /= count;
            
            let variance = 0;
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    const idx = y * width + x;
                    const diff = laplacian[idx] - mean;
                    variance += diff * diff;
                }
            }
            variance /= count;
            
            console.log("Laplacian Variance:", variance);
            
            // Rejects flat/blurry printed papers (< 5.0) and high-frequency moire pixel grids (> 350.0)
            if (variance < 5.0 || variance > 350.0) {
                return false;
            }
            return true;
        }

        function showAlert(type, message) {
            alertBox.className = `alert alert-${type} mb-4`;
            alertBox.innerText = message;
            alertBox.classList.remove('d-none');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        regForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('voter_name').value.trim();
            if (!name) return;

            // Flash screen effect
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Analysing Facial Biometrics...';

            // Draw frame to canvas first for liveness verification
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageDataUrl = canvas.toDataURL('image/jpeg');

            // 1. Biometric Liveness Verification
            if (!checkLiveness(canvas)) {
                showAlert('danger', "Biometric Spoof Detected: Image is too blurry or flat. Printed paper printouts or digital mobile screens are rejected.");
                resetSubmitButton();
                return;
            }

            const voters = await getDB('voters', []);

            // 2. Duplicate check by Name
            const exists = voters.some(v => v.full_name.toLowerCase() === name.toLowerCase());
            if (exists) {
                showAlert('danger', `Registration Blocked: A voter named '${name}' is already registered.`);
                resetSubmitButton();
                return;
            }

            // Add voter to database
            voters.push({
                id: Date.now(),
                full_name: name,
                has_voted: false,
                capture_path: imageDataUrl,
                candidate_chosen: null,
                voted_at: null
            });

            showSpinner("Recording registration to secure cloud ledger...");
            await setDB('voters', voters);
            hideSpinner();

            showAlert('success', `Voter '${name}' successfully enrolled with secure biometric face encoding!`);
            document.getElementById('voter_name').value = '';
            resetSubmitButton();
        });

        function resetSubmitButton() {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="bi bi-camera-fill me-2"></i>CAPTURE FACE & REGISTER VOTER';
        }
    </script>
</body>
</html>
