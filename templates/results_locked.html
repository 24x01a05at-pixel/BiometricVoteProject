<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Locked | Biometric Voting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
        .card-locked { background: rgba(30, 41, 59, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="d-flex flex-column justify-content-between">

    <nav class="navbar navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-shield-check text-info me-2"></i>Biometric Vote</a>
            <a href="/" class="btn btn-outline-light btn-sm"><i class="bi bi-house me-1"></i>Home Portal</a>
        </div>
    </nav>

    <div class="container text-center my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card card-locked p-5 text-center">
                    <div class="mb-4 text-warning">
                        <i class="bi bi-lock-fill display-1"></i>
                    </div>
                    <h2 class="fw-bold mb-3 text-warning">Election Results Locked</h2>
                    <p class="lead text-light opacity-75 mb-4">
                        To maintain election integrity, vote tallies are biometrically sealed during active voting. Results will be publicly released once the Admin officially ends the election.
                    </p>

                    <div class="p-3 bg-dark rounded-3 mb-4 border border-secondary">
                        <span class="text-secondary small d-block">Current Election Status</span>
                        <span class="fw-bold fs-5 text-uppercase text-info">{{ state.status }}</span>
                    </div>

                    <div class="d-grid gap-2 col-8 mx-auto">
                        <a href="/" class="btn btn-primary btn-lg fw-bold"><i class="bi bi-house me-2"></i>Return to Home Portal</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
