<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 12px; border: none; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); background: white; }
        .btn-primary { background-color: #3b82f6; border: none; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <div class="mb-4">
            <h2 class="fw-bold text-dark">VoteSecure Admin</h2>
            <p class="text-muted">Enter password to access dashboard</p>
        </div>
        <form method="POST">
            <input type="password" name="password" class="form-control mb-3 py-2" placeholder="Admin Password" required autofocus>
            <button type="submit" class="btn btn-primary w-100 py-2">Unlock Dashboard</button>
        </form>
        {% if error %}
            <div class="alert alert-danger mt-3 py-2 small">{{error}}</div>
        {% endif %}
    </div>
</body>
</html>
