<!DOCTYPE html>
<html>
<head>
    <title>Voting Booth Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-dark text-white">
    <div class="container mt-5 text-center">
        <div class="card bg-secondary p-5 shadow-lg mx-auto" style="max-width: 600px;">
            <i class="bi bi-camera-fill mb-3" style="font-size: 4rem; color: #00d4ff;"></i>
            <h2 class="mb-4">Biometric Voting Booth</h2>
            <p class="lead">To ensure 100% security, the Biometric Camera runs as a dedicated system process.</p>
            <hr class="bg-light">
            <div class="text-start mb-4">
                <h5><i class="bi bi-terminal-fill me-2"></i> How to Start:</h5>
                <ol>
                    <li>Keep this Dashboard open.</li>
                    <li>Go to your <strong>PowerShell</strong> terminal.</li>
                    <li>Type: <code>python vote.py</code></li>
                    <li>The secure camera window will appear!</li>
                </ol>
            </div>
            <a href="/" class="btn btn-info w-100">Return to Dashboard</a>
        </div>
    </div>
</body>
</html>
