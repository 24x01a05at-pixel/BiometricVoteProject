<!DOCTYPE html>
<html>
<head><title>Register Voter</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></head>
<body class="bg-light"><div class="container mt-5"><div class="card p-4 shadow">
    <h2>Voter Registration</h2>
    <form action="/register_voter" method="post">
        <div class="mb-3"><label>Full Name</label><input type="text" name="name" class="form-control" required></div>
        <p class="text-muted">Note: Camera will capture your face automatically upon submission.</p>
        <button type="submit" class="btn btn-primary">Capture & Register</button>
    </form>
</div></div></body></html>
