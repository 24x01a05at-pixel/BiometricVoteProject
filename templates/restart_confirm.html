<!DOCTYPE html>
<html>
<head>
    <title>System Reset | VoteSecure</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-lg p-4">
                    <h3 class="text-danger fw-bold"><i class="bi bi-exclamation-triangle"></i> Critical Action</h3>
                    <p class="text-muted">You are about to wipe all election results and logs. This cannot be undone.</p>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Enter Admin Password</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required autofocus>
                        </div>
                        {% if error %}
                            <div class="alert alert-danger py-2">{{ error }}</div>
                        {% endif %}
                        <button type="submit" class="btn btn-danger w-100">Confirm Master Reset</button>
                        <a href="/" class="btn btn-link w-100 mt-2 text-decoration-none text-muted">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
